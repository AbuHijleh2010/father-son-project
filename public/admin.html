<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>لوحة التحكم | متجر الأب والطفل</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <nav class="glass" id="mainNav">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <i data-lucide="sparkles" style="color: var(--secondary)"></i>
          <span>متجر الأب والطفل</span>
        </a>
        <button
          onclick="logout()"
          id="logoutBtn"
          style="
            display: none;
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
          "
        >
          <span>تسجيل الخروج</span>
          <i data-lucide="log-out" style="width: 18px"></i>
        </button>
      </div>
    </nav>

    <main class="container">
      <!-- Login Form -->
      <div id="loginView" class="admin-login-wrapper">
        <div class="admin-card glass">
          <h1 style="margin-bottom: 20px">🔒 دخول الإدارة</h1>
          <input
            type="password"
            id="adminPassword"
            class="input-field"
            style="text-align: center"
            placeholder="أدخل كلمة المرور"
          />
          <p
            id="loginError"
            style="color: #ef4444; margin-bottom: 15px; display: none"
          >
            كلمة المرور غير صحيحة!
          </p>
          <button class="hero-btn" style="width: 100%" onclick="login()">
            دخول
          </button>
          <a
            href="index.html"
            style="display: block; margin-top: 12px; color: var(--text-muted)"
            >العودة للمتجر</a
          >
        </div>
      </div>

      <!-- Dashboard View -->
      <div id="dashboardView" style="display: none; padding: 40px 0">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
          "
        >
          <h1>🛠️ لوحة تحكم الإدارة</h1>
          <button
            class="hero-btn"
            style="background: #ef4444; width: auto"
            onclick="logout()"
          >
            تسجيل الخروج
          </button>
        </div>
        <div
          id="adminStats"
          class="admin-stats glass"
          style="padding: 24px; border-radius: var(--radius-lg); margin: 30px 0"
        ></div>

        <div
          id="adminOrdersSection"
          class="glass"
          style="
            padding: 30px;
            border-radius: var(--radius-lg);
            margin: 40px 0;
            overflow-x: auto;
          "
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              gap: 20px;
              flex-wrap: wrap;
              margin-bottom: 18px;
            "
          >
            <div>
              <h3>الطلبات الواردة</h3>
              <div
                style="
                  display: flex;
                  flex-wrap: wrap;
                  gap: 8px;
                  margin-top: 10px;
                "
              >
                <button
                  class="hero-btn"
                  id="filterAllBtn"
                  style="
                    background: rgba(59, 130, 246, 0.12);
                    color: #2563eb;
                    width: auto;
                  "
                  onclick="setAdminOrderFilter('all')"
                >
                  كل الطلبات
                </button>
                <button
                  class="hero-btn"
                  id="filterPendingBtn"
                  style="
                    background: rgba(34, 197, 94, 0.12);
                    color: #16a34a;
                    width: auto;
                  "
                  onclick="setAdminOrderFilter('pending')"
                >
                  الطلبات الجديدة
                </button>
              </div>
            </div>
            <span
              id="adminOrdersBadge"
              style="
                background: rgba(34, 197, 94, 0.15);
                color: #16a34a;
                padding: 10px 16px;
                border-radius: 999px;
                font-weight: 700;
              "
            ></span>
          </div>
          <table id="adminOrdersTable">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>العميل</th>
                <th>الجوال</th>
                <th>الحالة</th>
                <th>الإجمالي</th>
                <th>التاريخ</th>
                <th>تفاصيل الطلب</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="adminOrdersBody">
              <!-- Orders will be injected here -->
            </tbody>
          </table>
        </div>

        <div
          class="glass"
          style="padding: 30px; border-radius: var(--radius-lg); margin: 40px 0"
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              gap: 20px;
              flex-wrap: wrap;
            "
          >
            <h3 id="formTitle">إضافة منتج جديد</h3>
            <div style="display: flex; gap: 10px">
              <button
                class="hero-btn"
                style="
                  background: rgba(45, 212, 191, 0.18);
                  color: var(--accent);
                  width: auto;
                "
                onclick="renderAdminProducts()"
              >
                تحديث
              </button>
              <button
                class="hero-btn"
                id="cancelBtn"
                style="
                  background: rgba(156, 163, 175, 0.12);
                  color: #9ca3af;
                  width: auto;
                  display: none;
                "
                onclick="cancelEdit()"
              >
                إلغاء
              </button>
            </div>
          </div>
          <div class="admin-form-grid">
            <div class="field-group">
              <label for="pTitle">عنوان المنتج</label>
              <input
                id="pTitle"
                class="input-field"
                placeholder="عنوان المنتج"
              />
            </div>
            <div class="field-group">
              <label for="pPrice">السعر</label>
              <input
                id="pPrice"
                class="input-field"
                placeholder="السعر"
                type="number"
              />
            </div>
            <div class="field-group">
              <label for="pImage">رابط الصورة</label>
              <input
                id="pImage"
                class="input-field"
                placeholder="رابط الصورة"
              />
            </div>
            <div class="field-group">
              <label for="pType">نوع المنتج</label>
              <select id="pType" class="input-field">
                <option value="father">أب</option>
                <option value="child">طفل</option>
              </select>
            </div>
            <div class="field-group">
              <label for="pMatch">معرف المطابقة</label>
              <input
                id="pMatch"
                class="input-field"
                placeholder="معرف المطابقة (match_id)"
              />
            </div>
            <div class="field-group">
              <label for="pSizes">الأحجام</label>
              <input
                id="pSizes"
                class="input-field"
                placeholder="الأحجام (مثال: S,M,L)"
              />
            </div>
            <div class="field-group">
              <label for="pQuantity">الكمية المتاحة</label>
              <input
                id="pQuantity"
                class="input-field"
                placeholder="الكمية المتاحة"
                type="number"
                value="0"
                min="0"
              />
            </div>
            <div class="field-group">
              <label for="pDiscount">الخصم (%)</label>
              <input
                id="pDiscount"
                class="input-field"
                placeholder="الخصم (%)"
                type="number"
                value="0"
                min="0"
                max="100"
              />
            </div>
            <input type="hidden" id="pId" value="" />
            <div class="field-group field-group--full">
              <label for="pDesc">وصف المنتج</label>
              <textarea
                id="pDesc"
                class="input-field"
                placeholder="وصف المنتج"
              ></textarea>
            </div>
            <div class="admin-form-actions field-group field-group--full">
              <button class="hero-btn" id="submitBtn" onclick="addProduct()">
                إضافة المنتج
              </button>
            </div>
          </div>
        </div>

        <div
          class="glass"
          style="
            padding: 30px;
            border-radius: var(--radius-lg);
            overflow-x: auto;
          "
        >
          <h3>المنتجات الحالية</h3>
          <table id="adminProductsTable">
            <thead>
              <tr>
                <th>الصورة</th>
                <th>العنوان</th>
                <th>السعر</th>
                <th>الكمية</th>
                <th>الخصم</th>
                <th>النوع</th>
                <th>الأحجام</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="adminProductsBody">
              <!-- Products will be injected here -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="script.js?v=4"></script>
    <script>
      // Specific logic for admin page
      let adminNavButton;

      const setAdminNavButton = (isLoggedIn) => {
        if (!adminNavButton) return;
        if (isLoggedIn) {
          adminNavButton.innerHTML = `
            <span>تسجيل الخروج</span>
            <i data-lucide="log-out" style="width: 18px"></i>
          `;
          adminNavButton.onclick = logout;
        } else {
          adminNavButton.innerHTML = `
            <span>العودة للصفحة</span>
            <i data-lucide="arrow-right" style="width: 18px"></i>
          `;
          adminNavButton.onclick = () => {
            window.location.href = "index.html";
          };
        }
        adminNavButton.style.display = "inline-flex";
        if (typeof lucide !== "undefined") lucide.createIcons();
      };

      document.addEventListener("DOMContentLoaded", () => {
        adminNavButton = document.getElementById("logoutBtn");
        const isAdmin = localStorage.getItem("admin_auth") === "true";
        setAdminNavButton(isAdmin);
        if (isAdmin) {
          showDashboard();
        }
      });

      function login() {
        const pass = document.getElementById("adminPassword").value;
        const errorEl = document.getElementById("loginError");
        if (errorEl) {
          errorEl.style.display = "none";
          errorEl.innerText = "كلمة المرور غير صحيحة!";
        }

        if (pass === "admin123") {
          localStorage.setItem("admin_auth", "true");
          window.location.href = "admin.html";
        } else {
          if (errorEl) errorEl.style.display = "block";
        }
      }

      function showDashboard() {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("dashboardView").style.display = "block";
        if (adminNavButton) adminNavButton.style.display = "block";
        try {
          renderAdminProducts();
          renderAdminOrders();
        } catch (error) {
          console.error("renderAdminProducts failed:", error);
        }
      }
    </script>
  </body>
</html>
