<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>حسابي | متجر الأب والطفل</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <nav class="glass" id="mainNav">
      <div
        class="nav-container"
        style="justify-content: space-between; gap: 16px"
      >
        <a href="index.html" class="logo">
          <i data-lucide="sparkles" style="color: var(--secondary)"></i>
          <span>متجر الأب والطفل</span>
        </a>
        <div class="nav-actions"></div>
      </div>
    </nav>

    <main class="container" style="padding: 90px 20px; min-height: 100vh">
      <div
        class="glass"
        style="
          padding: 40px;
          max-width: 700px;
          margin: 0 auto;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        "
      >
        <h1 style="margin-bottom: 20px; font-size: 2rem">أهلاً بك في حسابك</h1>
        <p
          id="accountGreeting"
          style="
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 25px;
          "
        >
          جارٍ تحميل بيانات الحساب...
        </p>
        <div style="display: grid; gap: 16px">
          <div class="glass" style="padding: 20px">
            <h2 style="margin-bottom: 10px">بيانات الحساب</h2>
            <p>
              <strong>المستخدم:</strong> <span id="accountUsername">–</span>
            </p>
            <p>
              <strong>البريد الإلكتروني:</strong>
              <span id="accountEmail">–</span>
            </p>
          </div>
          <div class="glass" style="padding: 20px; display: grid; gap: 12px">
            <h2 style="margin-bottom: 10px">خيارات الحساب</h2>
            <button
              id="shopBtn"
              class="hero-btn"
              style="width: 100%; background: var(--accent); color: #000"
            >
              اذهب إلى المتجر
            </button>
            <button id="logoutBtn" class="hero-btn" style="width: 100%">
              تسجيل خروج
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js?v=4"></script>
    <script>
      const renderAccount = () => {
        const user = JSON.parse(localStorage.getItem("shopUser") || "null");
        const greeting = document.getElementById("accountGreeting");
        const usernameEl = document.getElementById("accountUsername");
        const logoutBtn = document.getElementById("logoutBtn");
        const shopBtn = document.getElementById("shopBtn");

        if (!user) {
          greeting.innerText =
            "لم يتم تسجيل الدخول بعد. يرجى تسجيل الدخول أولاً.";
          usernameEl.innerText = "ضيف";
          shopBtn.innerText = "زيارة الموقع";
          shopBtn.onclick = () => (window.location.href = "index.html");
          logoutBtn.innerText = "العودة لتسجيل الدخول";
          logoutBtn.onclick = () => (window.location.href = "login.html");
          return;
        }

        greeting.innerText = `مرحباً ${user.username}! يمكنك هنا إدارة حسابك.`;
        usernameEl.innerText = user.username;
        const accountEmailEl = document.getElementById("accountEmail");
        if (accountEmailEl) accountEmailEl.innerText = user.email || "–";
        shopBtn.innerText = "زيارة الموقع الآن";
        shopBtn.onclick = () => (window.location.href = "index.html");
        logoutBtn.onclick = () => {
          logout();
          window.location.href = "index.html";
        };
      };

      document.addEventListener("DOMContentLoaded", () => {
        renderAccount();
        if (typeof lucide !== "undefined") lucide.createIcons();
      });
    </script>
  </body>
</html>
