<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>طلباتي | متجر الأب والطفل</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.292.0"></script>
  </head>
  <body>
    <nav class="glass" id="mainNav">
      <div
        class="nav-container"
        style="justify-content: space-between; gap: 16px"
      >
        <div style="display: flex; align-items: center; gap: 16px">
          <a href="index.html" class="logo">
            <i data-lucide="sparkles" style="color: var(--secondary)"></i>
            <span>متجر الأب والطفل</span>
          </a>
          <a
            href="index.html"
            style="
              color: var(--text-muted);
              text-decoration: none;
              display: flex;
              align-items: center;
              gap: 8px;
            "
          >
            <span>العودة للمتجر</span>
            <i data-lucide="home" style="width: 18px"></i>
          </a>
        </div>
        <div
          id="trackNavActions"
          style="display: flex; align-items: center; gap: 12px"
        ></div>
      </div>
    </nav>

    <main class="container" style="padding: 100px 20px; text-align: center">
      <h1 style="margin-bottom: 12px">📦 طلباتي</h1>
      <p style="color: var(--text-muted); margin-bottom: 28px">
        هنا تعرض كل الطلبات التي طلبتها من حسابك، مع الحالة الحالية، تفاصيل
        المنتجات، والعنوان.
      </p>

      <div id="ordersContainer" style="max-width: 920px; margin: 0 auto"></div>
    </main>

    <script src="script.js?v=5"></script>
    <script>
// Specific logic for Order Tracking page (track.html)

const orderSteps = [
  "تم استلام الطلب",
  "قيد التجهيز",
  "تم الشحن",
  "في الطريق إليك",
  "تم التوصيل",
];

const orderStatusMap = {
  "في الانتظار": 1,
  "قيد التجهيز": 2,
  "جارٍ التجهيز": 2,
  "تم استلام الطلب": 1,
  "تم الشحن": 3,
  "في الطريق": 4,
  "في الطريق إليك": 4,
  "تم التوصيل": 5,
};

const getOrderStep = (status) => orderStatusMap[status] || 1;

const formatOrderDate = (value) => {
  if (!value) return "-";
  try {
    return new Date(value).toLocaleDateString("ar-EG", {
      day: "numeric",
      month: "long",
      year: "numeric",
    });
  } catch {
    return value;
  }
};

const renderOrderSteps = (currentStep) => {
  return orderSteps
    .map((label, index) => {
      const step = index + 1;
      const done = step <= currentStep;
      return `
        <div style="display:flex; align-items:center; gap:12px; padding: 14px 16px; border-radius: 14px; background: ${done ? "rgba(56,189,248,0.18)" : "rgba(255,255,255,0.04)"}; border: 1px solid ${done ? "rgba(56,189,248,0.25)" : "rgba(255,255,255,0.08)"};">
            <span style="min-width:28px; min-height:28px; display:flex; align-items:center; justify-content:center; border-radius:50%; background: ${done ? "var(--secondary)" : "rgba(255,255,255,0.08)"}; color: ${done ? "#000" : "var(--text-muted)"}; font-weight:700;">${step}</span>
            <span style="font-weight:600; color: ${done ? "white" : "var(--text-muted)"};">${label}</span>
        </div>
      `;
    })
    .join("");
};

const formatTrackOrderItems = (items) => {
  if (!Array.isArray(items) || items.length === 0) return "غير متوفر";
  return items
    .map(
      (item) =>
        `${item.title} ×${item.quantity || 1}${item.size ? ` (${item.size})` : ""}`,
    )
    .join("، ");
};



async function trackOrder() {
  const id = document.getElementById("orderIdInput").value.trim();
  const orders = await fetchOrders();
  const normalizedSearch = id.replace(/\s+/g, "");
  const order = orders.find(
    (o) =>
      o.id === id ||
      o.phone === normalizedSearch ||
      o.email?.toLowerCase() === id.toLowerCase(),
  );

  if (order) {
    document.getElementById("orderResult").style.display = "block";
    document.getElementById("trackError").style.display = "none";
    document.getElementById("resId").innerText = order.id;
    document.getElementById("resStatus").innerText = order.status;
    document.getElementById("resName").innerText = order.name;
    document.getElementById("resEmail").innerText = order.email || "غير متوفر";
    document.getElementById("resPhone").innerText = order.phone || "غير متوفر";
    document.getElementById("resAddress").innerText = order.address || "غير متوفر";
    document.getElementById("resItems").innerText = formatTrackOrderItems(order.items);
    document.getElementById("resTotal").innerText = order.total || "0.00";
    document.getElementById("resDate").innerText = formatOrderDate(
      order.created_at || order.date || "",
    );
    const currentStep = getOrderStep(order.status);
    document.getElementById("trackingSteps").innerHTML = renderOrderSteps(currentStep);
    document.getElementById("resMessage").innerText =
      order.status === "تم التوصيل"
        ? "تم تسليم طلبك بنجاح. نتمنى لك استخداماً سعيداً!"
        : "طلبك تحت المتابعة الآن، وسيتم التواصل معك قريباً عبر رقم الجوال إذا احتجنا أي معلومات إضافية.";
  } else {
    document.getElementById("orderResult").style.display = "none";
    document.getElementById("trackError").style.display = "block";
  }
}

const renderTrackNavActions = () => {
  const navActions = document.getElementById("trackNavActions");
  if (!navActions) return;
  const user = getLoggedInUser();
  if (user) {
    navActions.innerHTML = `
      <a href="account.html" class="nav-icon" title="حسابي"><i data-lucide="user"></i></a>
      <button class="nav-icon" title="تسجيل خروج" onclick="logout(); window.location.href='index.html';" style="background:none; border:none; padding: 0; cursor:pointer; color: var(--text-muted);">
          <i data-lucide="log-out"></i>
      </button>
    `;
  } else {
    navActions.innerHTML = `
      <a href="login.html" class="nav-icon" title="تسجيل دخول"><i data-lucide="log-in"></i></a>
      <a href="signup.html" class="nav-icon" title="إنشاء حساب"><i data-lucide="user-plus"></i></a>
    `;
  }
  if (typeof lucide !== "undefined") lucide.createIcons();
};

const renderCustomerOrders = async () => {
  const container = document.getElementById("ordersContainer");
  const user = getLoggedInUser();
  
  if (!container) return;

  const urlParams = new URLSearchParams(window.location.search);
  const orderIdFromUrl = urlParams.get('order')?.trim();

  let ordersToRender = [];
  let isFilteredView = false;

  if (orderIdFromUrl) {
    const allOrders = await fetchOrders();
    const specificOrder = allOrders.find(o => o.id === orderIdFromUrl);
    if (specificOrder) {
      ordersToRender = [specificOrder];
      isFilteredView = true;
    } else {
      container.innerHTML = `
        <div class="glass" style="padding: 40px; border-radius: var(--radius-lg); background: rgba(255,255,255,0.05); margin-bottom: 20px;">
          <h2 style="color: #ef4444;">⚠️ الطلب غير موجود</h2>
          <p style="color: var(--text-muted); margin: 16px 0 0">
            لم نتمكن من العثور على طلب بالرقم <strong>${orderIdFromUrl}</strong>. يرجى التأكد من رقم الطلب وحاول مجدداً.
          </p>
          <div style="margin-top: 24px;">
            <a href="track.html" class="hero-btn" style="width: auto; padding: 10px 24px;">العودة لصفحة طلباتي</a>
          </div>
        </div>
      `;
      return;
    }
  } else if (user) {
    ordersToRender = await fetchOrders(user.username);
    if (ordersToRender.length === 0) {
      container.innerHTML = `
        <div class="glass" style="padding: 40px; border-radius: var(--radius-lg); background: rgba(255,255,255,0.05);">
          <h2>لم يتم حفظ أي طلب</h2>
          <p style="color: var(--text-muted); margin: 16px 0 0">
            لم يتم العثور على أي طلبات على الخادم حالياً.
          </p>
          <p style="color: var(--text-muted); margin: 16px 0 0">
            إذا أكملت الشراء وتريد رؤية الطلب هنا، سجّل الدخول بنفس الحساب الذي استخدمته عند الشراء.
          </p>
        </div>
      `;
      return;
    }
  } else {
    container.innerHTML = `
      <div class="glass" style="padding: 40px; border-radius: var(--radius-lg); background: rgba(255,255,255,0.05);">
        <h2>مرحباً بك!</h2>
        <p style="color: var(--text-muted); margin: 16px 0 0">
          سجل دخولك لعرض قائمة طلباتك السابقة، أو تتبع طلبك مباشرة أدناه.
        </p>
        <div style="margin-top: 24px; display:flex; justify-content:center; gap: 12px; flex-wrap: wrap;">
          <a href="login.html" class="hero-btn" style="min-width: 140px">تسجيل دخول</a>
          <a href="signup.html" class="hero-btn" style="min-width: 140px">إنشاء حساب</a>
        </div>
        
        <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 30px;">
          <h3 style="font-size: 1.1rem; margin-bottom: 10px;">🔍 تتبع طلبك مباشرة</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">أدخل رقم الطلب (مثال: TRK-1234) الممنوح لك عند الدفع:</p>
          <div style="display: flex; gap: 10px; max-width: 420px; margin: 0 auto;">
            <input type="text" id="manualOrderIdInput" class="input-field" placeholder="رقم الطلب (TRK-xxxx)" style="text-align: center; font-weight: bold; letter-spacing: 1px;" />
            <button class="hero-btn" onclick="searchOrderManually()" style="width: auto; padding: 0 24px;">تتبع</button>
          </div>
        </div>
      </div>
    `;
    return;
  }

  let backButtonHTML = "";
  if (isFilteredView) {
    backButtonHTML = `
      <div style="margin-bottom: 20px; text-align: right;">
        <a href="track.html" class="hero-btn" style="width: auto; padding: 8px 16px; background: rgba(255,255,255,0.06); color: var(--text-main); display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1);">
          <i data-lucide="arrow-right" style="width: 16px;"></i>
          <span>${user ? "عرض كل طلباتي" : "تتبع طلب آخر"}</span>
        </a>
      </div>
    `;
  }

  container.innerHTML = backButtonHTML + ordersToRender
    .slice()
    .reverse()
    .map(
      (order) => {
        const isCancelled = order.status === "ملغي";
        
        let parsedAddress;
        try {
          parsedAddress = JSON.parse(order.address);
        } catch {
          parsedAddress = { recipient: order.name, city: order.address, area: "", street: "", coordinates: "", notes: "" };
        }

        let cancelMsg = "تنبيه: تم إلغاء هذا الطلب من قبل الإدارة. يرجى التواصل معنا لمزيد من التفاصيل.";
        if (order.cancel_reason) {
          cancelMsg = `تنبيه: تم إلغاء هذا الطلب (${order.cancel_reason}).`;
        }
        const warningBanner = isCancelled 
          ? `<div style="background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: #ef4444; padding: 14px 18px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 700; text-align: right;">
               <i data-lucide="alert-triangle" style="width: 20px; height: 20px; flex-shrink: 0;"></i>
               <span>${cancelMsg}</span>
             </div>` 
          : "";

        const itemsHTML = (order.items || []).map(item => {
          const isPromo = item.discount && item.discount > 0;
          const finalPrice = isPromo ? item.price * (1 - item.discount / 100) : item.price;
          return `
            <div style="display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 8px;">
              <img src="${item.image || fallbackImage}" width="50" height="50" style="object-fit: cover; border-radius: 6px;" onerror="this.src='${fallbackImage}'">
              <div style="flex: 1; text-align: right;">
                <h4 style="font-size: 0.9rem; margin: 0 0 4px 0; font-weight: 700; color: var(--text-main);">${item.title}</h4>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">
                  ${item.size ? `المقاس: ${item.size} | ` : ""}الكمية: ${item.quantity || 1} | 
                  السعر: ${isPromo ? `<span style="text-decoration: line-through; margin-inline-end: 5px;">${Number(item.price).toFixed(2)} ₪</span>` : ""}${Number(finalPrice).toFixed(2)} ₪
                </p>
              </div>
            </div>
          `;
        }).join("");

        const pMethod = String(order.payment_method || "").toLowerCase().trim();
        const paymentMethodText = (pMethod === "visa" || pMethod === "فيزا") 
          ? "فيزا 💳" 
          : (pMethod === "paypal" || pMethod === "paypal 🅿️") 
            ? "بايبال 🅿️" 
            : "كاش (عند الاستلام) 💵";

        const pStatus = String(order.payment_status || "").trim();
        const paymentStatusText = (pStatus === "Paid" || pStatus === "مدفوع") 
          ? "تم الدفع ✅" 
          : "لم يتم الدفع ❌";

        return `
        <div class="glass" style="padding: 28px; border-radius: var(--radius-lg); margin-bottom: 22px; text-align: right;">
          ${warningBanner}
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap;">
            <div>
              <p style="margin: 0; color: var(--text-muted);">رقم الطلب</p>
              <h2 style="margin: 8px 0 0; direction: ltr; letter-spacing: 0.12em;">${order.id}</h2>
            </div>
            <span style="background: ${isCancelled ? "rgba(239,68,68,0.12)" : "rgba(56,189,248,0.12)"}; color: ${isCancelled ? "#ef4444" : "var(--secondary)"}; padding: 10px 16px; border-radius: 999px; font-weight: 700; white-space: nowrap;">${order.status}</span>
          </div>
          
          <div style="margin-top: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
            <!-- Right Column: Basic Info & Delivery -->
            <div>
              <h3 style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; margin: 0 0 12px 0; font-size: 1rem; color: var(--secondary);">📍 معلومات التوصيل</h3>
              <div style="display: grid; gap: 8px; font-size: 0.88rem;">
                <p style="margin: 0;"><strong>المستلم:</strong> ${parsedAddress.recipient || order.name}</p>
                <p style="margin: 0;"><strong>المدينة:</strong> ${parsedAddress.city || "غير متوفر"}</p>
                ${parsedAddress.area ? `<p style="margin: 0;"><strong>المنطقة / الحي:</strong> ${parsedAddress.area}</p>` : ""}
                ${parsedAddress.street ? `<p style="margin: 0;"><strong>الشارع:</strong> ${parsedAddress.street}</p>` : ""}
                <p style="margin: 0;"><strong>رقم الجوال:</strong> ${order.phone || "غير متوفر"}</p>
                ${parsedAddress.notes ? `<p style="margin: 0; font-style: italic; color: var(--text-muted);"><strong>ملاحظات:</strong> ${parsedAddress.notes}</p>` : ""}
                ${parsedAddress.coordinates ? `
                  <div style="margin-top: 5px;">
                    <a href="https://www.google.com/maps/search/?api=1&query=${parsedAddress.coordinates}" target="_blank" style="display: inline-flex; align-items: center; gap: 6px; background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.25); padding: 5px 10px; border-radius: 6px; font-size: 0.78rem; text-decoration: none; font-weight:700;">🗺️ عرض موقع التوصيل على الخريطة</a>
                  </div>` : ""}
              </div>
            </div>

            <!-- Left Column: Products & Payment -->
            <div>
              <h3 style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; margin: 0 0 12px 0; font-size: 1rem; color: var(--secondary);">🛍️ المنتجات والتكلفة</h3>
              <div style="max-height: 180px; overflow-y: auto; padding-inline-end: 4px; margin-bottom: 12px;">
                ${itemsHTML}
              </div>
              <div style="display: grid; gap: 6px; font-size: 0.88rem; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px;">
                <p style="margin: 0;"><strong>طريقة الدفع:</strong> ${paymentMethodText}</p>
                <p style="margin: 0;"><strong>حالة الدفع:</strong> <span style="font-weight: 700; color: ${order.payment_status === "Paid" ? "#10b981" : "#ef4444"};">${paymentStatusText}</span></p>
                <p style="margin: 0; font-size: 1.05rem; color: var(--secondary);"><strong>المجموع الإجمالي:</strong> ${Number(order.total).toFixed(2)} ₪</p>
              </div>
            </div>
          </div>

          <div style="margin-top: 25px; display: grid; gap: 10px;">
            ${isCancelled ? "" : renderOrderSteps(getOrderStep(order.status))}
          </div>
          ${!isCancelled && order.status !== "في الطريق إليك" && order.status !== "تم التوصيل" ? `
            <div style="margin-top: 15px; text-align: left;">
              <button class="hero-btn" style="background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.25); width: auto; padding: 8px 16px; font-size: 0.85rem;" onclick="cancelOrderByCustomer('${order.id}')">
                ❌ إلغاء الطلب
              </button>
            </div>
          ` : ""}
        </div>
      `;
      }
    )
    .join("");
  
  if (typeof lucide !== "undefined") lucide.createIcons();
};

document.addEventListener("DOMContentLoaded", () => {
  renderTrackNavActions();
  renderCustomerOrders();
});

async function cancelOrderByCustomer(orderId) {
  if (!confirm("هل أنت متأكد من رغبتك في إلغاء هذا الطلب؟")) return;
  try {
    const res = await fetch("/api/orders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "updateStatus",
        id: orderId,
        status: "ملغي",
        cancel_reason: "ملغي من قبل الزبون",
        initiatedByUser: true
      })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      alert("تم إلغاء الطلب بنجاح.");
      location.reload();
    } else {
      alert(data.error || "فشل إلغاء الطلب.");
    }
  } catch (err) {
    console.error("Error cancelling order:", err);
    alert("حدث خطأ أثناء الاتصال بالخادم.");
  }
}
window.cancelOrderByCustomer = cancelOrderByCustomer;

function searchOrderManually() {
  const inputVal = document.getElementById("manualOrderIdInput")?.value.trim();
  if (!inputVal) {
    alert("الرجاء إدخال رقم الطلب.");
    return;
  }
  window.location.href = `track.html?order=${inputVal}`;
}
window.searchOrderManually = searchOrderManually;

// Bind to window for inline events
window.trackOrder = trackOrder;

    </script>
  </body>
</html>
