<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>المتجر | متجر الأب والطفل</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="loader-wrapper" id="loader">
      <div class="loader"></div>
    </div>

    <div id="toast" class="toast"></div>

    <nav class="glass" id="mainNav">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <i data-lucide="sparkles" style="color: var(--secondary)"></i>
          <span>متجر الأب والطفل</span>
        </a>

        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="ابحث في المتجر..."
          />
        </div>

        <div class="nav-actions">
          <a href="track.html" class="nav-icon" title="تتبع طلبك"
            ><i data-lucide="package"></i
          ></a>
          <a href="login.html" class="nav-icon" title="تسجيل دخول"
            ><i data-lucide="log-in"></i
          ></a>
          <a href="signup.html" class="nav-icon" title="إنشاء حساب"
            ><i data-lucide="user-plus"></i
          ></a>
          <button
            class="nav-icon"
            title="بحث"
            onclick="document.getElementById('searchInput').focus()"
          >
            <i data-lucide="search"></i>
          </button>
          <button
            class="nav-icon"
            title="السلة"
            style="position: relative"
            id="cartBtn"
          >
            <i data-lucide="shopping-cart"></i>
            <span id="cartCount" class="cart-badge" style="display: none"
              >0</span
            >
          </button>
          <a href="admin.html" class="nav-icon" title="لوحة التحكم"
            ><i data-lucide="lock"></i
          ></a>
        </div>
      </div>
    </nav>

    <main class="container" style="padding-top: 120px">
      <div class="section-header">
        <h1 id="shopTitle">كافة المنتجات</h1>
        <div
          id="filterIndicator"
          style="color: var(--primary); font-weight: bold; display: none"
        >
          تصفية حسب: <span id="currentFilter"></span>
          <button
            onclick="clearCategoryFilter()"
            style="
              background: none;
              border: none;
              color: #ef4444;
              cursor: pointer;
              margin-right: 10px;
            "
          >
            عرض الكل
          </button>
        </div>
      </div>

      <div class="categories-grid" id="categoriesContainer"></div>

      <div
        class="products-grid"
        id="productsContainer"
        style="margin-top: 40px"
      ></div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cartOverlay" class="cart-overlay">
      <div class="cart-sidebar">
        <div class="cart-header">
          <h2>سلة المشتريات</h2>
          <button class="close-btn" id="closeCart">&times;</button>
        </div>
        <div class="cart-content" id="cartContent">
          <!-- Cart items will be injected here -->
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none">
          <div style="margin-bottom: 18px; text-align: right">
            <label
              for="checkoutAddress"
              style="display: block; margin-bottom: 8px; font-weight: 700"
              >عنوان التوصيل</label
            >
            <textarea
              id="checkoutAddress"
              class="input-field"
              rows="3"
              placeholder="اكتب العنوان الكامل ثم اضغط إتمام الشراء"
              style="width: 100%; resize: vertical"
            ></textarea>
            <p
              id="checkoutAddressError"
              style="
                color: #ef4444;
                margin-top: 6px;
                display: none;
                font-size: 0.95rem;
              "
            >
              الرجاء إدخال عنوان التوصيل.
            </p>
          </div>
          <div style="margin-bottom: 18px; text-align: right">
            <label
              for="checkoutPhone"
              style="display: block; margin-bottom: 8px; font-weight: 700"
              >رقم الجوال</label
            >
            <input
              id="checkoutPhone"
              class="input-field"
              type="tel"
              placeholder="مثال: 009627XXXXXXXX"
              style="width: 100%"
            />
            <p
              id="checkoutPhoneError"
              style="
                color: #ef4444;
                margin-top: 6px;
                display: none;
                font-size: 0.95rem;
              "
            >
              الرجاء إدخال رقم جوال صالح.
            </p>
          </div>
          <div class="total-section">
            <span>المجموع:</span>
            <span id="cartTotal">0$</span>
          </div>
          <button class="checkout-btn" onclick="checkoutCart(event)">
            إتمام الشراء الآن
          </button>
        </div>
      </div>
    </div>

    <footer>
      <div class="container">
        <div class="logo" style="justify-content: center; margin-bottom: 20px">
          <span>👨‍👦</span>
          <span>متجر الأب والطفل</span>
        </div>
        <p style="color: var(--text-dim); max-width: 600px; margin: 0 auto">
          تنسيق مثالي لكل اللحظات.
        </p>
      </div>
    </footer>

    <script src="script.js?v=4"></script>
    <script>
      // Store page specific logic
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get("cat");
        if (catId) {
          setTimeout(() => filterByCategory(parseInt(catId)), 600);
        }
      });
    </script>
  </body>
</html>
